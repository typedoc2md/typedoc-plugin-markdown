name: CI
on:
  push:
    paths:
      - '.github/workflows/ci.yml'
      - 'packages/typedoc-plugin-markdown/**'
      - '!packages/typedoc-plugin-markdown/README.md'
      - '!packages/typedoc-plugin-markdown/CHANGELOG.md'
      - '!packages/typedoc-plugin-markdown/package.json'
    branches:
      - main
      - release
      - beta
  pull_request:
    paths:
      - 'packages/typedoc-plugin-markdown/**'
      - '!packages/typedoc-plugin-markdown/README.md'
      - '!packages/typedoc-plugin-markdown/CHANGELOG.md'
      - '!packages/typedoc-plugin-markdown/package.json'
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20.19.0']
    name: Node ${{ matrix.node }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install
        run: HUSKY=0 npm ci
      - name: Lint
        if: matrix.node == '20.19.0'
        run: npm run lint-all
      - name: Build All Workspaces
        if: matrix.node == '20.19.0'
        run: npm run build-all
      - name: Test All Workspaces
        if: matrix.node == '20.19.0'
        run: npm run test-all
      - name: Build
        if: matrix.node == '18'
        run: npm run build-all
